name: Build RAK4631 LTO UF2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade platformio

      - name: Build RAK4631 repeater
        run: |
          pio pkg install -e RAK_4631_repeater

          mkdir -p lib/Adafruit_LittleFS/src

          cp -r ~/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_LittleFS/src/* \
            lib/Adafruit_LittleFS/src/

          export CPATH="$GITHUB_WORKSPACE/lib/Adafruit_LittleFS/src:$CPATH"

          pio run -e RAK_4631_repeater

      - name: Collect firmware
        run: |
          mkdir -p firmware

          find .pio/build -name "*.zip" -exec cp {} firmware/ \;
          find .pio/build -name "*.hex" -exec cp {} firmware/ \;
          find .pio/build -name "*.elf" -exec cp {} firmware/ \;

          echo "Collected files:"
          ls -lah firmware

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: RAK4631-LTO-firmware
          path: firmware/
